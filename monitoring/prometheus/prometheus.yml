# Prometheus scrape configuration for Streamline local development.
# Used by the root docker-compose.yml monitoring profile.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: 'streamline'
    static_configs:
      - targets: ['streamline-dev:9094']
    metrics_path: '/metrics'
    scrape_interval: 5s
