{{- if .Values.auth.enabled -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "streamline.fullname" . }}-auth
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "streamline.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.auth.sasl.username }}
  sasl-username: {{ .Values.auth.sasl.username | b64enc | quote }}
  {{- end }}
  {{- if .Values.auth.sasl.password }}
  sasl-password: {{ .Values.auth.sasl.password | b64enc | quote }}
  {{- end }}
  {{- range $key, $value := .Values.auth.extraSecrets }}
  {{ $key }}: {{ $value | b64enc | quote }}
  {{- end }}
{{- end }}
---
{{- if .Values.tls.enabled -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "streamline.fullname" . }}-tls
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "streamline.labels" . | nindent 4 }}
type: kubernetes.io/tls
data:
  {{- if .Values.tls.certData }}
  tls.crt: {{ .Values.tls.certData | quote }}
  {{- end }}
  {{- if .Values.tls.keyData }}
  tls.key: {{ .Values.tls.keyData | quote }}
  {{- end }}
  {{- if .Values.tls.caData }}
  ca.crt: {{ .Values.tls.caData | quote }}
  {{- end }}
{{- end }}
